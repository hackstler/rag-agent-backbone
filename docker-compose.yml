version: "3.9"

# Stack local completo para desarrollo RAG
# Uso: docker-compose up
# Luego: docker-compose exec ollama ollama pull mistral
#         docker-compose exec ollama ollama pull nomic-embed-text

services:
  # PostgreSQL con extensión pgvector para búsqueda semántica
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: ragdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d ragdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Ollama para LLM y embeddings locales (sin API keys)
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # Para GPU NVIDIA: descomentar lo siguiente
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # API del agente RAG
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://dev:dev@postgres:5432/ragdb
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_LLM_MODEL: mistral
      OLLAMA_EMBED_MODEL: nomic-embed-text
      NODE_ENV: development
      PORT: 3000
    env_file:
      - .env
    volumes:
      - ./src:/app/src:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  ollama_data:
